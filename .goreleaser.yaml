version: 2

project_name: pyxcloud

before:
  hooks:
    - go mod tidy

builds:
  - id: pyxcloud
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - windows
      - darwin
    goarch:
      - 386
      - amd64
      - arm64
    ignore:
      - goos: darwin
        goarch: 386
    ldflags:
      - -s -w -X github.com/pyxcloud/pyxcloud-cli/cmd.Version={{.Version}}

archives:
  - format: tar.gz
    name_template: >-
      {{ .ProjectName }}_
      {{- title .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else if eq .Arch "386" }}i386
      {{- else }}{{ .Arch }}{{ end }}
    format_overrides:
      - goos: windows
        format: zip

checksum:
  name_template: 'checksums.txt'

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^test:'

nfpms:
  - vendor: "CumulusCorp Inc."
    homepage: "https://pyxcloud.io"
    maintainer: "CumulusCorp <support@pyxcloud.io>"
    description: "PyxCloud CLI"
    license: "Proprietary"
    formats:
      - apk
      - deb
      - rpm
    bindir: /usr/bin

release:
  github:
    owner: PyxCloud
    name: pyxcloud-cli
  draft: false
  prerelease: auto
  name_template: "PyxCloud CLI v{{.Version}}"
  header: |
    ## PyxCloud CLI v{{.Version}}
    
    ### Installation
    
    **macOS / Linux (universal installer):**
    ```bash
    curl -sL https://github.com/PyxCloud/pyxcloud-cli/releases/latest/download/install.sh | bash
    ```
    
    **Manual download:** Pick the archive matching your OS and architecture from the assets below.
  extra_files:
    - glob: scripts/install.sh


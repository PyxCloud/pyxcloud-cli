name: release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  packages: write

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          check-latest: true

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: latest
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Install MSITools
        run: sudo apt-get update && sudo apt-get install -y msitools wixl

      - name: Build MSI Installer
        run: |
          # Extract the version from github ref
          VERSION=${GITHUB_REF#refs/tags/v}
          if [ -z "$VERSION" ]; then VERSION="0.0.0"; fi
          
          # Find the Windows executable generated by GoReleaser
          EXE_PATH=$(find dist/ -name "pyxcloud.exe" | grep "windows_amd64" | head -n 1)
          if [ -z "$EXE_PATH" ]; then
            echo "Windows executable not found in dist/"
            exit 1
          fi
          
          echo "Building MSI for version $VERSION using $EXE_PATH"
          wixl -v -D Version=$VERSION -D BinaryPath=$EXE_PATH -o dist/pyxcloud-installer-amd64.msi windows/installer.wxs

      - name: Release MSI
        uses: softprops/action-gh-release@v2
        with:
          files: dist/pyxcloud-installer-amd64.msi
